version: "3.9"

services:
  db:
    # pgvector/pgvector:pg16 = Postgres 16 + pgvector extension preinstalled.
    # The plain postgres:16-alpine image works for everything except the
    # ``CREATE EXTENSION vector`` step in alembic migration
    # ``0002_pgvector_native_knn`` — switching here keeps local-dev /
    # docker-compose deployments capable of running the full migration
    # head without manual extension setup.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: kheritage
      POSTGRES_PASSWORD: kheritage
      POSTGRES_DB: kheritage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kheritage"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://kheritage:kheritage@db:5432/kheritage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # ``alembic upgrade head`` installs the pgvector extension + adds
    # the ``vector(768)`` column / HNSW index on top of the baseline
    # schema (versions/0001_baseline + 0002_pgvector_native_knn).
    # ``seed`` then loads sample documents / users / trends on top of
    # the migrated schema. Both commands are idempotent — they only
    # touch missing rows / unapplied revisions, so the container can be
    # restarted without resetting data.
    command: >
      sh -c "alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Daily scheduler that re-runs the trend discovery pipeline once per day
  # (default 18 UTC = 03 KST). Operators with their own scheduler (k8s
  # CronJob, host cron, GitHub Actions) can drop this service and instead
  # invoke `python -m app.jobs.refresh_trends` on their preferred cadence.
  trends_refresher:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://kheritage:kheritage@db:5432/kheritage
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.jobs.refresh_scheduler

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
